<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Downloader Pro Mobile</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/50/764ba2/dog.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%); --glass-bg: rgba(255, 255, 255, 0.95); }
        body { background: var(--primary-gradient); font-family: 'Poppins', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 15px; }
        .main-card { background: var(--glass-bg); border-radius: 25px; padding: 25px 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); width: 100%; max-width: 480px; }
        #preview-box { background: #f1f3f5; border-radius: 18px; padding: 8px; margin-bottom: 20px; display: none; border: 1px solid #dee2e6; }
        #capa_video { width: 100%; border-radius: 12px; object-fit: cover; }
        .btn-colar { background: #e7f3ff; color: #1877f2; border: 2px dashed #1877f2; width: 100%; padding: 12px; border-radius: 15px; font-weight: 600; margin-bottom: 15px; cursor: pointer; }
        .btn-download { background: var(--primary-gradient); border: none; padding: 16px; border-radius: 15px; font-weight: 600; color: white; width: 100%; font-size: 1.1rem; box-shadow: 0 8px 15px rgba(118, 75, 162, 0.3); }
        .rede-social { font-size: 1.6rem; margin: 0 12px; }
        #loader { display: none; font-size: 0.8rem; color: #764ba2; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="main-card text-center">
    <h3 class="mb-1">Downloader Pro 🐕</h3>
    <p class="text-muted small mb-4">Cole o link e baixe em segundos</p>
    
    <div class="mb-4">
        <i class="fab fa-youtube text-danger rede-social"></i>
        <i class="fab fa-instagram text-danger rede-social"></i>
        <i class="fab fa-tiktok text-dark rede-social"></i>
        <i class="fab fa-facebook text-primary rede-social"></i>
    </div>

    <div id="loader"><i class="fas fa-spinner fa-spin"></i> Buscando vídeo...</div>
    
    <div id="preview-box">
        <img id="capa_video" src="">
        <p id="titulo_video" class="fw-bold mt-2 small text-dark text-truncate"></p>
    </div>

    <button type="button" class="btn-colar" onclick="colarLink()">
        <i class="fas fa-paste me-2"></i> COLAR LINK
    </button>

    <form method="POST" action="/">
        <div class="mb-3">
            <input type="url" id="link" name="link" class="form-control" style="border-radius:12px; padding:14px;" placeholder="https://..." oninput="buscarInfo()" required>
        </div>
        <button type="submit" class="btn btn-download">
            <i class="fas fa-rocket me-2"></i> BAIXAR AGORA
        </button>
    </form>
</div>

<script>
    async function buscarInfo() {
        const link = document.getElementById('link').value;
        const box = document.getElementById('preview-box');
        const loader = document.getElementById('loader');
        if (link.length > 10) {
            loader.style.display = 'block';
            try {
                const response = await fetch('/get_info', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({link: link})
                });
                const data = await response.json();
                if (data.thumb) {
                    document.getElementById('capa_video').src = data.thumb;
                    document.getElementById('titulo_video').innerText = data.title;
                    box.style.display = 'block';
                }
            } catch (e) { box.style.display = 'none'; }
            finally { loader.style.display = 'none'; }
        }
    }

    async function colarLink() {
        try {
            const texto = await navigator.clipboard.readText();
            document.getElementById('link').value = texto;
            buscarInfo();
        } catch (err) { alert("Cole o link manualmente."); }
    }
</script>
</body>
</html>
