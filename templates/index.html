<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloader Pro 🐕</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/50/764ba2/dog.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 450px; text-align: center; }
        #preview { display: none; margin-bottom: 15px; }
        img { width: 100%; border-radius: 10px; }
        .btn-download { background: #764ba2; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h3>🐕 Dog Downloader</h3>
        <p class="text-muted">YouTube, TikTok, Insta, Face</p>
        
        <div id="preview">
            <img id="thumb" src="">
            <p id="title" class="small fw-bold mt-2"></p>
        </div>

        <form method="POST" action="/">
            <input type="url" name="link_video" id="link" class="form-control mb-3" placeholder="Cole o link aqui..." oninput="buscar()" required>
            
            <div class="d-flex gap-2 mb-3">
                <input type="radio" class="btn-check" name="qualidade" id="alta" value="alta" checked>
                <label class="btn btn-outline-primary w-50" for="alta">Alta</label>
                <input type="radio" class="btn-check" name="qualidade" id="baixa" value="baixa">
                <label class="btn btn-outline-secondary w-50" for="baixa">Baixa</label>
            </div>

            <button type="submit" class="btn-download">BAIXAR AGORA</button>
        </form>
    </div>

    <script>
        async function buscar() {
            const link = document.getElementById('link').value;
            if (link.length > 10) {
                const res = await fetch('/get_info', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({link_video: link})
                });
                const data = await res.json();
                if (data.thumb) {
                    document.getElementById('thumb').src = data.thumb;
                    document.getElementById('title').innerText = data.title;
                    document.getElementById('preview').style.display = 'block';
                }
            }
        }
    </script>
</body>
</html>
